name: CI #include the operating system code

on:
  push:
    branches: [ master ] #because the code is belong to the master branch
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code #function inside the github function that will copy the code to the tertial machine of hte function
      uses: actions/checkout@v4 #need to check the version of this function

    - name: Set up JDK 17
      uses: actions/setup-java@v4 #version 4, install java files into the virtual machine
      with:
        distribution: 'adopt'
        java-version: '17'

    - name: Build with Gradle #the virtual machine will includ ethe gradle
      run: gradle build #virtual machine will be done in teh cloud, 

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/libs/**

    - name: Run Unit Test
      run: gradle test

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: build/reports/tests/**
    - name: Generate code coverage report
      run: gradle jacocoTestReport

    - name: Upload code coverage report
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: build/reports/jacoco/test/html/**
        
    - name: Run Deployment
      run: java -jar build/libs/hello-world-java-V1.jar
